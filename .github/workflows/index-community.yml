name: Index Community Vaults

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]
    paths:
      - 'community-vaults.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build community index
        run: node scripts/build-community-index.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add community-index.json
          git diff --staged --quiet || (git commit -m "chore: regenerate community-index.json [skip ci]" && git pull --rebase origin main && git push)
